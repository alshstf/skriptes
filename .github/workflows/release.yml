name: release

on:
  push:
    tags: ['v*.*.*']
  # Позволяет запустить руками с произвольным тегом — для дебага рабочки.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (must already exist on the repo)'
        required: true
        type: string

permissions:
  contents: write   # softprops/action-gh-release создаёт GitHub Release
  packages: write   # push в ghcr.io

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/skriptes-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/skriptes-frontend

jobs:
  release:
    runs-on: ubuntu-latest
    # Нормальная сборка укладывается в ~6-8 мин; кап (вместо дефолтных 6ч)
    # роняет зависшую сборку быстро. Раньше флэйк frontend-сборки (qemu-arm64)
    # на 0.9.0 сжёг 6ч до отмены — теперь упадёт за 30 мин.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── вычисляем теги для каждого образа ────────────────────────
      # Метаданные стандартизируем: для тега v0.1.0-alpha.1 получим
      # 0.1.0-alpha.1; "latest" не ставим на пре-релизы (есть `-` в имени).
      - name: Backend image metadata
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}},enable=${{ !contains(github.ref_name, '-') }}
            type=semver,pattern={{major}},enable=${{ !contains(github.ref_name, '-') }}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Frontend image metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}},enable=${{ !contains(github.ref_name, '-') }}
            type=semver,pattern={{major}},enable=${{ !contains(github.ref_name, '-') }}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      # ── multi-arch сборка backend ────────────────────────────────
      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          provenance: false

      # ── frontend ────────────────────────────────────────────────
      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          provenance: false

      # ── GitHub Release с автогенерируемыми note'ами ─────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            Container images:
            - `${{ env.BACKEND_IMAGE }}:${{ github.ref_name }}` (сокращённо, без `v`-префикса в тегах)
            - `${{ env.FRONTEND_IMAGE }}:${{ github.ref_name }}`

            Поддерживаемые arch: linux/amd64, linux/arm64.

            Смотри [README](https://github.com/${{ github.repository }}#быстрый-старт) для инструкции развёртывания.
