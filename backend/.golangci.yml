version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - gosec
    - misspell
    - revive
    - unconvert
    - unparam
  settings:
    gosec:
      excludes:
        - G104
    misspell:
      ignore-rules:
        - autor # имя полей API Фантлаба (autor_rusname и т.п.)
    revive:
      rules:
        - name: var-naming
        - name: exported
          disabled: true
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - gocritic

formatters:
  enable:
    - gofmt
    - goimports
