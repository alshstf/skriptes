<!doctype html>
<html lang="ru" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>skriptes</title>

    <!--
      PWA / install-to-home-screen:
        - link[rel=manifest] делает приложение «устанавливаемым» (Chrome,
          Edge, Safari iOS 16.4+, Firefox PWA-расширение).
        - apple-touch-icon — iOS Safari игнорирует SVG-иконки из manifest
          и использует ЭТУ ссылку для home-screen значка.
        - apple-mobile-web-app-* — iOS standalone-mode flags. Без них
          установленное PWA на iPhone открывается в Safari-tab'е с
          адресной строкой, что выглядит хуже.
        - favicon-32 для табов desktop-браузеров (SVG не везде поддержан
          как favicon, но в современных — да; держим оба для safety).
    -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon-32.png" type="image/png" sizes="32x32" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="skriptes" />
  </head>
  <body class="bg-background text-foreground antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
