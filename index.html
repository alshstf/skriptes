  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

0;letter-spacing:0}\n.wrap{max-width:1180px;margin:0 auto;padding:0 56px}\n\n/* nav */\n.nav{display:flex;align-items:center;justify-content:space-between;padding:20px 0;border-bottom:1px solid rgba(255,255,255,.06)}\n.logo{display:flex;align-items:center;gap:10px;font-weight:600;font-size:17px}\n.logo .mark{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,#5b8def,#3a5fc4);display:grid;place-items:center;font-weight:700;font-size:14px;color:#fff}\n.nav-links{display:flex;align-items:center;gap:28px;font-size:14px;color:var(--mut)}\n.nav-links a:hover{color:var(--txt)}\n.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:13px 26px;border-radius:10px;font-weight:600;font-size:15.5px;min-height:44px;transition:transform .2s ease,box-shadow .2s ease,background .2s ease;cursor:pointer}\n.btn:hover{transform:translateY(-1px)}\n.btn-pri{background:var(--acc);color:#0d1117}\n.btn-pri:hover{box-shadow:0 8px 30px rgba(91,141,239,.35)}\n.btn-sec{border:1px solid rgba(255,255,255,.16);color:var(--txt);font-weight:500}\n.btn-sec:hover{border-color:rgba(255,255,255,.35)}\n.btn-ghost{padding:8px 16px;border:1px solid rgba(255,255,255,.14);border-radius:8px;color:var(--txt);font-weight:500;font-size:14px;min-height:36px}\n.btn-ghost:hover{border-color:rgba(255,255,255,.35)}\n\n/* hero */\n.hero{position:relative;overflow:hidden}\n#glow{position:absolute;inset:-30% 0 0 0;pointer-events:none;background:radial-gradient(ellipse 70% 45% at 50% 30%,rgba(91,141,239,.38),transparent 65%);will-change:transform;animation:breathe 6s ease-in-out infinite}\n.hero-in{position:relative;padding:80px 0 96px;text-align:center}\n.badge{display:inline-flex;align-items:center;gap:8px;font-size:12.5px;font-weight:500;color:var(--acc2);background:rgba(91,141,239,.1);border:1px solid rgba(91,141,239,.25);border-radius:99px;padding:6px 14px;margin-bottom:26px}\nh1{margin:0 auto;max-width:780px;font-size:40px;line-height:1.22;text-wrap:balance}\n.sub{margin:20px auto 0;max-width:600px;font-size:17.5px;line-height:1.55;color:var(--mut);text-wrap:pretty}\n\n/* search mock */\n.search{max-width:680px;margin:44px auto 0;text-align:left}\n.sbox{position:relative;display:flex;align-items:center;gap:14px;background:var(--panel);border:1.5px solid var(--acc);border-radius:14px;padding:18px 24px;box-shadow:0 0 0 6px rgba(91,141,239,.08),0 24px 70px rgba(0,0,0,.5)}\n.beam{position:absolute;inset:-2px;border-radius:16px;padding:2px;background:conic-gradient(from var(--a,0deg),transparent 0 76%,rgba(150,190,255,.95) 90%,transparent 100%);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);mask-composite:exclude;animation:beam 4s linear infinite;pointer-events:none}\n.sq{font-size:19px}\n.cursor{display:inline-block;width:2px;height:22px;background:var(--acc);vertical-align:-4px;margin-left:2px;animation:blink 1.1s steps(1) infinite}\n.ms{margin-left:auto;font-size:12px;color:var(--dim)}\n.results{background:var(--panel);border:1px solid rgba(255,255,255,.09);border-radius:14px;margin-top:10px;overflow:hidden}\n.row{display:flex;align-items:center;gap:16px;padding:13px 20px}\n.row+.row{border-top:1px solid rgba(255,255,255,.05)}\n.row.hit{background:rgba(91,141,239,.08)}\n.row img{flex:none;width:34px;height:50px;border-radius:4px;object-fit:cover}\n.row .t{font-size:15px;font-weight:600}\n.row .m{font-size:12.5px;color:var(--mut)}\n.row .tag{margin-left:auto;font-size:11.5px;color:var(--acc2)}\n.cta{display:flex;justify-content:center;gap:14px;margin-top:40px}\n\n/* sections */\nsection{padding:96px 0 0}\nh2.sec{margin:0 auto;max-width:840px;font-size:27px;line-height:1.3;text-align:center}\n.kicker{font-size:12.5px;color:var(--acc2);margin-bottom:16px}\n\n/* features */\n.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;margin-top:44px}\n.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:28px;transition:transform .25s ease,border-color .25s ease,box-shadow .25s ease}\n.card:hover{transform:translateY(-4px);border-color:rgba(91,141,239,.5);box-shadow:0 12px 40px rgba(0,0,0,.45)}\n.card .k{font-size:12px;color:var(--acc2);margin-bottom:14px}\n.card h3{margin:0 0 10px;font-size:19px;font-weight:600}\n.card p{margin:0;font-size:14.5px;line-height:1.6;color:var(--mut);text-wrap:pretty}\n\n/* enrichment */\n.enrich{display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:center;padding:96px 0}\n.enrich h2{margin:0;font-size:27px;line-height:1.3;text-wrap:balance;text-align:left}\n.bullets{display:flex;flex-direction:column;gap:18px;margin-top:28px}\n.bullet{display:flex;gap:14px}\n.bullet .dot{flex:none;width:6px;height:6px;border-radius:50%;background:var(--acc);margin-top:8px}\n.bullet p{margin:0;font-size:15px;line-height:1.6;color:#c3cad6}\n.bullet b{color:var(--txt)}\n.note{margin:24px 0 0;font-size:13.5px;color:var(--dim);line-height:1.6}\n.bookcard{background:var(--panel);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:26px;box-shadow:0 20px 60px rgba(0,0,0,.4)}\n.bookrow{display:flex;gap:20px}\n.bookrow>img{flex:none;width:120px;aspect-ratio:2/3;border-radius:8px;object-fit:cover;box-shadow:0 8px 24px rgba(0,0,0,.5)}\n.bookrow h4{margin:0;font-size:19px;font-weight:600}\n.bookrow .a{margin:6px 0 0;font-size:13.5px;color:var(--acc2)}\n.bookrow .d{margin:12px 0 0;font-size:13px;line-height:1.55;color:var(--mut)}\n.chips{display:flex;gap:8px;margin-top:14px}\n.chip-pri{font-size:12px;padding:6px 12px;background:var(--acc);color:#0d1117;border-radius:7px;font-weight:600}\n.chip-sec{font-size:12px;padding:6px 12px;border:1px solid rgba(255,255,255,.16);border-radius:7px}\n.films{margin-top:20px;border-top:1px solid var(--line);padding-top:16px}\n.films .k{font-size:11.5px;color:var(--dim);margin-bottom:10px}\n.films .posters{display:flex;gap:12px;align-items:center}\n.films img{width:74px;aspect-ratio:2/3;border-radius:6px;object-fit:cover}\n.films .meta{font-size:12.5px;color:var(--mut);line-height:1.5}\n\n/* quickstart */\n.quick{background:#0c0f13;border-top:1px solid rgba(255,255,255,.06);border-bottom:1px solid rgba(255,255,255,.06);padding:96px 0;margin-top:96px}\n.quick-grid{display:grid;grid-template-columns:1fr 1.1fr;gap:56px;align-items:center}\n.quick h2{margin:0;font-size:27px;line-height:1.3;text-wrap:balance;text-align:left}\n.steps{display:flex;flex-direction:column;gap:22px;margin-top:32px}\n.step{display:flex;gap:16px}\n.step .n{flex:none;width:26px;height:26px;border-radius:8px;background:rgba(91,141,239,.15);color:var(--acc2);display:grid;place-items:center;font-size:13px;font-weight:600}\n.step .t{font-size:16px;font-weight:600}\n.step .d{margin-top:4px;font-size:13.5px;line-height:1.55;color:var(--mut)}\n.term{background:#10151c;border:1px solid rgba(91,141,239,.25);border-radius:12px;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.55);font-size:13px;line-height:1.75}\n.term-hd{display:flex;align-items:center;gap:7px;padding:11px 14px;border-bottom:1px solid rgba(91,141,239,.15)}\n.term-hd i{width:9px;height:9px;border-radius:50%;background:#2a3140}\n.term-hd span{margin-left:10px;font-size:11.5px;color:var(--dim)}\n.term-bd{padding:18px 20px;color:var(--mut)}\n.p{color:var(--acc)}.w{color:var(--txt)}.f{color:#4a5568}.ok{color:var(--acc2)}\n.tcursor{animation:blink 1s steps(1) infinite;color:var(--acc)}\n\n/* footer */\n.footer{padding:72px 0 60px;text-align:center}\n.footer h2{margin:0;font-size:24px;line-height:1.3}\n.code{max-width:760px;margin:28px auto 0;background:var(--panel);border:1px solid rgba(255,255,255,.1);border-radius:12px;text-align:left;overflow:hidden}\n.code-hd{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;border-bottom:1px solid var(--line)}\n.code-hd span{font-size:11.5px;color:var(--dim)}\n#copy{background:none;border:1px solid rgba(255,255,255,.14);border-radius:7px;color:var(--mut);font-size:11.5px;padding:5px 12px;cursor:pointer;font-family:'JetBrains Mono',monospace;transition:color .2s,border-color .2s}\n#copy:hover{color:var(--txt);border-color:rgba(255,255,255,.35)}\n.code-bd{padding:16px 20px;font-size:13px;line-height:1.9;color:#c3cad6;overflow-x:auto}\n.code-bd div{white-space:nowrap}\n.cmt{color:var(--dim)}\n.meta-line{margin:22px 0 0;font-size:13px;color:var(--dim)}\n.meta-line a{color:var(--mut);border-bottom:1px solid rgba(255,255,255,.2)}\n.meta-line a:hover{color:var(--txt)}\n\n/* reveal */\n.rv{opacity:0;transform:translateY(30px)}\n.rv.on{opacity:1;transform:translateY(0)}\n\n@property --a { syntax:'<angle>'; initial-value:0deg; inherits:false }\n@keyframes beam { to { --a:360deg } }\n@keyframes blink { 0%,55%{opacity:1} 56%,100%{opacity:0} }\n@keyframes breathe { 0%,100%{opacity:.7} 50%{opacity:1} }\n@keyframes pop { 0%{transform:scale(1)} 40%{transform:scale(1.35)} 100%{transform:scale(1)} }\n\n@media (prefers-reduced-motion: reduce){\n  .beam,.cursor,.tcursor,#glow{animation:none}\n  .rv{opacity:1;transform:none}\n  html{scroll-behavior:auto}\n}\n\n/* ============ mobile ============ */\n@media (max-width: 880px){\n  .wrap{padding:0 20px}\n  .nav{padding:14px 0}\n  .nav-links a:not(.btn-ghost){display:none}\n  .hero-in{padding:44px 0 56px}\n  h1{font-size:26px}\n  .sub{font-size:14.5px;max-width:340px}\n  .badge{font-size:11.5px}\n  .search{margin-top:28px}\n  .sbox{gap:10px;padding:14px 16px;border-radius:12px}\n  .sq{font-size:16px}\n  .cursor{height:19px}\n  .row{gap:12px;padding:11px 14px}\n  .row img{width:30px;height:44px}\n  .row .t{font-size:14px}\n  .row .m{font-size:11.5px}\n  .row .tag{font-size:10.5px}\n  .cta{flex-direction:column;gap:10px;margin-top:28px}\n  .btn{width:100%}\n  section{padding:56px 0 0}\n  h2.sec{font-size:20px}\n  .grid{grid-template-columns:1fr;gap:14px;margin-top:28px}\n  .card{padding:20px;border-radius:12px}\n  .card h3{font-size:16.5px}\n  .card p{font-size:13.5px}\n  .enrich{grid-template-columns:1fr;gap:24px;padding:56px 0}\n  .enrich h2{font-size:20px}\n  .bullet p{font-size:13.5px}\n  .bookcard{padding:18px}\n  .bookrow{gap:14px}\n  .bookrow>img{width:88px}\n  .bookrow h4{font-size:16px}\n  .films img{width:62px}\n  .quick{padding:56px 0;margin-top:56px}\n  .quick-grid{grid-template-columns:1fr;gap:24px}\n  .quick h2{font-size:20px}\n  .term{font-size:11px;line-height:1.8}\n  .footer{padding:48px 0 44px}\n  .footer h2{font-size:17px}\n  .code-bd{font-size:10.5px;line-height:2}\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<header class=\"wrap\">\n  <nav class=\"nav\">\n    <a class=\"logo\" href=\"#\"><span class=\"mark\">S<\u002Fspan>skriptes<\u002Fa>\n    <div class=\"nav-links\">\n      <a href=\"#features\">Возможности<\u002Fa>\n      <a href=\"#enrichment\">Обогащение<\u002Fa>\n      <a href=\"#quickstart\">Quick start<\u002Fa>\n      <a class=\"btn-ghost\" href=\"https://github.com/alshstf/skriptes\" target=\"_blank\" rel=\"noopener\">GitHub ↗<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fnav>\n<\u002Fheader>\n\n<div class=\"hero\">\n  <div id=\"glow\"><\u002Fdiv>\n  <div class=\"wrap hero-in\">\n    <div class=\"badge\">Open source · MIT · selfhosted<\u002Fdiv>\n    <h1 class=\"disp\">Вспомнили книгу?<br>Она уже найдена.<\u002Fh1>\n    <p class=\"sub\">Skriptes — нормальная fb2-библиотека из 2026: мгновенный поиск, прощающий опечатки, и доставка книг прямо на Kindle.<\u002Fp>\n    <div class=\"search\">\n      <div class=\"sbox\">\n        <div class=\"beam\"><\u002Fdiv>\n        <span style=\"color:var(--acc);font-size:19px\">⌕<\u002Fspan>\n        <span class=\"sq\"><span id=\"query\">солярис лем<\u002Fspan><span class=\"cursor\"><\u002Fspan><\u002Fspan>\n        <span class=\"ms mono\" id=\"ms\">8 мс<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"results\" id=\"results\">\n        <div class=\"row hit\">\n          <img src=\"2cbd1f15-a1b8-4714-a49d-f442bffba0a4\" alt=\"Обложка: Солярис\">\n          <div><div class=\"t\">Солярис<\u002Fdiv><div class=\"m\">Станислав Лем · 1961 · фантастика<\u002Fdiv><\u002Fdiv>\n          <span class=\"tag mono\">epub3 · kindle →<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"row\">\n          <img src=\"096f04e0-aaa3-4ef3-8043-7ae728313d9e\" alt=\"Обложка: Непобедимый\">\n          <div><div class=\"t\">Непобедимый<\u002Fdiv><div class=\"m\">Станислав Лем · 1964<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"row\">\n          <img src=\"a0016d4e-68b1-4073-b03e-e58e14cf1af7\" alt=\"Обложка: Кибериада\">\n          <div><div class=\"t\">Кибериада<\u002Fdiv><div class=\"m\">Станислав Лем · 1965<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"cta\">\n      <a class=\"btn btn-pri\" href=\"https://github.com/alshstf/skriptes\" target=\"_blank\" rel=\"noopener\">Открыть на GitHub<\u002Fa>\n      <a class=\"btn btn-sec\" href=\"#quickstart\">Quick start ↓<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<section id=\"features\" class=\"wrap\">\n  <h2 class=\"sec disp rv\">Всё, чего не хватало старым каталогизаторам<\u002Fh2>\n  <div class=\"grid\">\n    <div class=\"card rv\">\n      <div class=\"k mono\">meilisearch<\u002Fdiv>\n      <h3>Мгновенный поиск с опечатками<\u002Fh3>\n      <p>Название, автор, серия — результат на каждый символ. «Фаназия» найдёт фантастику, typo-tolerance из коробки.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"card rv\">\n      <div class=\"k mono\">fb2 → epub3 · kepub · azw8 · kfx<\u002Fdiv>\n      <h3>Конвертация на лету<\u002Fh3>\n      <p>Скачивайте в формате своей читалки. Кэш конвертированных файлов — повторное скачивание мгновенно.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"card rv\">\n      <div class=\"k mono\">send-to-kindle<\u002Fdiv>\n      <h3>Книга на Kindle в один клик<\u002Fh3>\n      <p>Отправка epub3 через ваш SMTP. Несколько адресатов — «Мой Kindle», «Kindle жены» — выбор перед отправкой.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"card rv\">\n      <div class=\"k mono\">read-only volume<\u002Fdiv>\n      <h3>Не трогает вашу коллекцию<\u002Fh3>\n      <p>Zip-архивы читаются напрямую, ничего не копируется и не дублируется. Библиотека остаётся вашей.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"card rv\">\n      <div class=\"k mono\">docker compose up<\u002Fdiv>\n      <h3>Одна команда — весь стек<\u002Fh3>\n      <p>Пять сервисов, авто-TLS, multi-arch образы для amd64 и arm64. Дружит с любым homelab-прокси.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"card rv\">\n      <div class=\"k mono\">авторы · серии · избранное<\u002Fdiv>\n      <h3>Библиотека, а не список файлов<\u002Fh3>\n      <p>Страницы авторов с биографией и статистикой, серии с обратными ссылками, избранное и выдача с учётом вашей истории.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section id=\"enrichment\" class=\"wrap\" style=\"padding:0\">\n  <div class=\"enrich\">\n    <div class=\"rv\">\n      <div class=\"kicker mono\">lazy enrichment<\u002Fdiv>\n      <h2 class=\"disp\">Карточки обогащаются сами<\u002Fh2>\n      <div class=\"bullets\">\n        <div class=\"bullet\"><span class=\"dot\"><\u002Fspan><p><b>Обложки и аннотации<\u002Fb> — из fb2, Open Library и Google Books. ~99% хит-рейт на русскоязычной коллекции.<\u002Fp><\u002Fdiv>\n        <div class=\"bullet\"><span class=\"dot\"><\u002Fspan><p><b>Биографии и портреты авторов<\u002Fb> — из Wikipedia, с разворачиваемым текстом для длинных био.<\u002Fp><\u002Fdiv>\n        <div class=\"bullet\"><span class=\"dot\"><\u002Fspan><p><b>Экранизации<\u002Fb> — через Wikidata: фильмы и сериалы по книге, с постерами и ссылками на Кинопоиск и IMDb.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <p class=\"note\">Всё лениво: подтягивается при первом открытии карточки и кэшируется. Личные данные наружу не уходят.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"bookcard rv\">\n      <div class=\"bookrow\">\n        <img src=\"3864d1da-f38b-4f7e-a645-7baa4119025c\" alt=\"Обложка книги «Мастер и Маргарита»\">\n        <div style=\"min-width:0\">\n          <h4>Мастер и Маргарита<\u002Fh4>\n          <p class=\"a\">Михаил Булгаков<\u002Fp>\n          <p class=\"d\">Роман о дьяволе, посетившем Москву 1930-х, о Понтии Пилате и о любви, которая сильнее…<\u002Fp>\n          <div class=\"chips\"><span class=\"chip-pri\">epub3 ↓<\u002Fspan><span class=\"chip-sec\">На Kindle →<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"films\">\n        <div class=\"k mono\">экранизации · wikidata<\u002Fdiv>\n        <div class=\"posters\">\n          <img src=\"6d1c266b-12b4-4480-a113-ef7b044f6b81\" alt=\"Постер экранизации 2024\">\n          <img src=\"8b105d6e-9d4f-47a2-9f5d-9a6878d22fa7\" alt=\"Постер сериала 2005\">\n          <img src=\"37d91b62-d7f1-4aab-9ee2-61e7ad7f7100\" alt=\"Постер экранизации 1994\">\n          <div class=\"meta\">2024 · 2005 · 1994<br>Кинопоиск · IMDb<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section id=\"quickstart\" class=\"quick\" style=\"padding-top:96px\">\n  <div class=\"wrap quick-grid\">\n    <div class=\"rv\">\n      <div class=\"kicker mono\">quick start<\u002Fdiv>\n      <h2 class=\"disp\">Пять минут — и библиотека онлайн<\u002Fh2>\n      <div class=\"steps\">\n        <div class=\"step\"><span class=\"n mono\">1<\u002Fspan><div><div class=\"t\">Скачайте compose и .env<\u002Fdiv><div class=\"d\">Три файла с GitHub — готовый релизный стек.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"step\"><span class=\"n mono\">2<\u002Fspan><div><div class=\"t\">Укажите пути к книгам и INPX<\u002Fdiv><div class=\"d\">Две переменные в .env — архивы монтируются read-only.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"step\"><span class=\"n mono\">3<\u002Fspan><div><div class=\"t\">docker compose up -d<\u002Fdiv><div class=\"d\">Пять контейнеров, авто-TLS, импорт стартует сам. Требования: Docker 24+, ~2 ГБ диска.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"term mono rv\">\n      <div class=\"term-hd\"><i><\u002Fi><i><\u002Fi><i><\u002Fi><span>nas:~/skriptes<\u002Fspan><\u002Fdiv>\n      <div class=\"term-bd\" id=\"term\">\n        <div><span class=\"p\">$<\u002Fspan> <span class=\"w\">docker compose up -d<\u002Fspan><\u002Fdiv>\n        <div>✔ postgres <span class=\"f\">.......<\u002Fspan> healthy<\u002Fdiv>\n        <div>✔ meilisearch <span class=\"f\">....<\u002Fspan> healthy<\u002Fdiv>\n        <div>✔ backend <span class=\"f\">........<\u002Fspan> healthy<\u002Fdiv>\n        <div>✔ frontend <span class=\"f\">.......<\u002Fspan> healthy<\u002Fdiv>\n        <div>✔ caddy <span class=\"f\">..........<\u002Fspan> https://skriptes.localhost<\u002Fdiv>\n        <div style=\"margin-top:10px\"><span class=\"p\">$<\u002Fspan> <span class=\"w\">docker compose logs -f backend<\u002Fspan><\u002Fdiv>\n        <div>inpx: found flibusta_all.inpx<\u002Fdiv>\n        <div>import: 512 340 books <span class=\"ok\">done<\u002Fspan> · reindex <span class=\"ok\">ok<\u002Fspan><\u002Fdiv>\n        <div><span class=\"tcursor\">▮<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<footer class=\"footer wrap rv\">\n  <h2 class=\"disp\">Ваша библиотека заслуживает 2026 год<\u002Fh2>\n  <div class=\"code\">\n    <div class=\"code-hd\">\n      <span class=\"mono\">запуск в homelab · релизный стек<\u002Fspan>\n      <button id=\"copy\" type=\"button\">⧉ копировать<\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"code-bd mono\" id=\"cmds\">\n      <div><span class=\"p\">$<\u002Fspan> mkdir -p ~/skriptes &amp;&amp; cd ~/skriptes<\u002Fdiv>\n      <div><span class=\"p\">$<\u002Fspan> RAW=https://raw.githubusercontent.com/alshstf/skriptes/main/infra<\u002Fdiv>\n      <div><span class=\"p\">$<\u002Fspan> curl -fO $RAW/docker-compose.release.yml &amp;&amp; curl -fo .env $RAW/.env.example &amp;&amp; curl -fO $RAW/Caddyfile<\u002Fdiv>\n      <div><span class=\"p\">$<\u002Fspan> $EDITOR .env <span class=\"cmt\"># BOOKS_HOST_PATH, INPX_HOST_PATH, SKRIPTES_VERSION<\u002Fspan><\u002Fdiv>\n      <div><span class=\"p\">$<\u002Fspan> docker compose -f docker-compose.release.yml --env-file .env up -d<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <p class=\"meta-line\">MIT · Go + TypeScript · <a href=\"https://github.com/alshstf/skriptes\" target=\"_blank\" rel=\"noopener\">github.com/alshstf/skriptes<\u002Fa><\u002Fp>\n<\u002Ffooter>\n\n<script>\n(function(){\n  var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n\n  // --- scroll reveals ---\n  var targets = Array.prototype.slice.call(document.querySelectorAll('.rv'));\n  if (reduce) { targets.forEach(function(el){ el.classList.add('on'); }); targets = []; }\n  targets.forEach(function(el, i){\n    el.style.transition = 'opacity .8s ease ' + ((i % 6) * 90) + 'ms, transform .9s cubic-bezier(.16,1,.3,1) ' + ((i % 6) * 90) + 'ms';\n  });\n  function sweep(){\n    if (!targets.length) return;\n    var vh = window.innerHeight;\n    targets = targets.filter(function(el){\n      if (el.getBoundingClientRect().top < vh * 0.96) { el.classList.add('on'); return false; }\n      return true;\n    });\n  }\n\n  // --- parallax glow ---\n  var glow = document.getElementById('glow');\n  var hero = glow ? glow.parentElement : null;\n\n  // --- terminal print-out ---\n  var term = document.getElementById('term');\n  var termStarted = reduce;\n  var termLines = term ? Array.prototype.slice.call(term.children) : [];\n  if (!reduce) termLines.forEach(function(l){ l.style.opacity = '0'; });\n  function startTerm(){\n    termLines.forEach(function(l, i){\n      setTimeout(function(){ l.style.transition = 'opacity .18s ease'; l.style.opacity = '1'; }, 150 + i * 220);\n    });\n  }\n\n  function tick(){\n    sweep();\n    if (hero && !reduce) {\n      var r = hero.getBoundingClientRect();\n      if (r.bottom > 0 && r.top < window.innerHeight) {\n        glow.style.transform = 'translateY(' + (-r.top * 0.5).toFixed(1) + 'px)';\n      }\n    }\n    if (!termStarted && term && term.getBoundingClientRect().top < window.innerHeight * 0.92) {\n      termStarted = true; startTerm();\n    }\n    requestAnimationFrame(tick);\n  }\n  tick();\n\n  // --- typewriter ---\n  var q = document.getElementById('query'), res = document.getElementById('results'), ms = document.getElementById('ms');\n  if (q && res && !reduce) {\n    var full = q.textContent;\n    q.textContent = '';\n    res.style.opacity = '0';\n    res.style.transform = 'translateY(10px)';\n    res.style.transition = 'opacity .5s ease, transform .5s cubic-bezier(.16,1,.3,1)';\n    ms.style.opacity = '0';\n    ms.style.transition = 'opacity .3s ease';\n    var i = 0;\n    var type = function(){\n      if (i <= full.length) {\n        q.textContent = full.slice(0, i++);\n        setTimeout(type, 65 + Math.random() * 70);\n      } else {\n        setTimeout(function(){\n          res.style.opacity = '1'; res.style.transform = 'translateY(0)';\n          ms.style.opacity = '1';\n          var n = 0;\n          var cnt = setInterval(function(){\n            n++; ms.textContent = n + ' мс';\n            if (n >= 8) { clearInterval(cnt); ms.style.animation = 'pop .5s ease'; }\n          }, 40);\n        }, 180);\n      }\n    };\n    setTimeout(type, 700);\n  }\n\n  // --- copy commands ---\n  var copyBtn = document.getElementById('copy');\n  if (copyBtn) copyBtn.addEventListener('click', function(){\n    var lines = Array.prototype.map.call(document.querySelectorAll('#cmds > div'), function(d){\n      return d.textContent.replace(/^\\$\\s*/, '').replace(/\\s*#.*$/, '');\n    });\n    navigator.clipboard.writeText(lines.join('\\n')).then(function(){\n      copyBtn.textContent = '✓ скопировано';\n      setTimeout(function(){ copyBtn.textContent = '⧉ копировать'; }, 2000);\n    });\n  });\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
